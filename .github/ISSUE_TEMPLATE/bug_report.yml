name: Bug report
description: Report reproducible gateway behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never paste API keys, proxy tokens, prompts, or proprietary source code.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Configure ...
        3. See ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04, etc.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: Output of python --version
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `claude-gateway doctor` output after checking it contains no sensitive data.
    validations:
      required: true
